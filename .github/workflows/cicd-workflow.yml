# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "feature" , "feature/*" , "feature/*/*" ]
    
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:


  # This workflow contains a single job called "build"
  test-build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: installing playwright dependencies
        run: |
          npm ci
          npx playwright install --with-deps

      # Runs a set of commands using the runners shell
      - name: Build image and start container
        run: |
          docker build -t frontend_img:latest ./frontend/.
          docker run -p 5173:5173 -d frontend_img:latest
          sleep 5
          cd zeptotests/playwright
          npx playwright test

      - name: Test confirmation
        run: echo testing has completed!   

  merge:

    needs: test-build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # REQUIRED for merging
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR
        run: |
          gh pr create \
            --base main \
            --head  ${{ github.ref_name }}\
            --title "Auto PR for ${{ github.ref_name }}" \
            --body "Automatically created PR"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge into main
        run: gh pr merge ${{ github.ref_name }} --merge --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           
      - name: Merge confirmation
        run: echo Merge completed!

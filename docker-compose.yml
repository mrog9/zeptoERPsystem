services:

  backend:

    build: ./backend
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NGINX_ENV: local
    depends_on: [backend]
    ports:
      - "80:80"

  playwright:

    build: ./zeptotests
    depends_on: [frontend]

  
